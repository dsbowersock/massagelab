<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>MassageLab Offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050505;
        color: #f7f2eb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(100%, 32rem);
        border: 1px solid rgba(255, 140, 42, 0.28);
        border-radius: 0.5rem;
        background: rgba(16, 16, 16, 0.92);
        padding: 1.5rem;
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.35rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #c9c0b8;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MassageLab is offline</h1>
      <p>Reconnect to load new pages. Local browser drafts and exported files remain on this device.</p>
    </main>
  </body>
</html>
