name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AUTH_SECRET: ci-browser-qa-auth-secret-not-for-production-use-only
      NEXTAUTH_SECRET: ci-browser-qa-auth-secret-not-for-production-use-only
      AUTH_URL: http://127.0.0.1:3010
      NEXTAUTH_URL: http://127.0.0.1:3010

    steps:
      - name: Check out repository
        # Pinned from actions/checkout@v6 on 2026-06-10.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Node
        # Pinned from actions/setup-node@v6 on 2026-06-10.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for browser QA
        run: npx playwright install --with-deps chromium

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Browser QA
        run: npm run test:browser
